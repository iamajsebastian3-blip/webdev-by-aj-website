<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Website Audit — WEBDEV BY AJ</title>
  <meta name="description" content="Get a free website audit. We'll show you exactly where your revenue is leaking — no commitment, no pitch." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-display: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --color-bg: #070714;
      --color-accent: #F5A623;
      --color-accent-hover: #FFB93E;
      --color-purple: #5e17eb;
      --color-purple-glow: rgba(94, 23, 235, 0.3);
      --color-text-primary: #F0EFF4;
      --color-text-secondary: #9896A8;
      --color-text-muted: #5E5C6E;
      --color-border: rgba(255, 255, 255, 0.08);
      --radius-sm: 6px;
      --radius-md: 12px;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-xs: 0.75rem;
    }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      font-weight: 400;
      color: var(--color-text-primary);
      background: var(--color-bg);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    a { text-decoration: none; color: inherit; }

    /* Glow effects */
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow--purple { background: var(--color-purple-glow); }
    .glow--1 {
      width: 500px; height: 500px;
      top: -10%; left: -10%;
    }
    .glow--2 {
      width: 400px; height: 400px;
      bottom: -10%; right: -10%;
    }

    /* Main container */
    .audit {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      overflow: hidden;
    }

    .audit__content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      text-align: center;
    }

    /* Badge */
    .audit__badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 50px;
      border: 1px solid var(--color-border);
      background: rgba(255, 255, 255, 0.04);
      font-size: var(--text-sm);
      color: var(--color-accent);
      font-weight: 500;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* Title */
    .audit__title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    .audit__title .highlight {
      background: linear-gradient(135deg, var(--color-accent), #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Description */
    .audit__desc {
      font-size: var(--text-base);
      color: var(--color-text-secondary);
      max-width: 520px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    /* Buttons */
    .audit__actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: var(--text-sm);
      padding: 0.95rem 2rem;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn--primary {
      background: var(--color-accent);
      color: var(--color-bg);
    }
    .btn--primary:hover {
      background: var(--color-accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245, 166, 35, 0.3);
    }

    .btn--dark {
      background: rgba(255, 255, 255, 0.06);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }
    .btn--dark:hover {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .btn__icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Disclaimer */
    .audit__disclaimer {
      font-size: var(--text-xs);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      font-weight: 500;
    }

    /* Back link */
    .audit__back {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s;
    }
    .audit__back:hover {
      color: var(--color-accent);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .audit__actions {
        flex-direction: column;
      }
      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
